<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍王副本攻略</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --navy:#0d1b4b; --dark:#070c1e; --gold:#c8a44a; --gold-light:#f0cc6a; }
body {
  background:#070c1e; color:white;
  font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;
  min-height:100vh; overflow-x:hidden;
}

/* HEADER */
.page-header {
  background:linear-gradient(135deg,#0a1238,#1a0830);
  border-bottom:2px solid var(--gold);
  padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
}
.header-title { font-size:28px; color:var(--gold-light); letter-spacing:6px; text-shadow:0 0 20px rgba(200,164,74,.7); }
.header-hint  { font-size:12px; color:#8899cc; margin-top:2px; }

/* LAYOUT */
.layout { display:flex; flex-direction:column; gap:12px; padding:12px 196px; max-width:100%; }

/* BOSS STAGE */
.boss-stage {
  position:relative; border-radius:10px; border:2px solid #253870;
  width:100%; aspect-ratio:16/9; overflow:hidden; background:#0a0a20;
  transition:border-color .2s,box-shadow .2s;
}
.boss-stage.drag-over     { border-color:var(--gold); box-shadow:0 0 30px rgba(200,164,74,.25); }
.boss-stage.marker-active { cursor:crosshair !important; }

/* MAP CONTENT */
.map-content {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:url('1.webp') center/cover no-repeat #0a0a20;
}

.stage-controls { position:absolute; top:10px; right:10px; z-index:30; display:flex; gap:6px; }
.stage-btn {
  background:rgba(13,27,75,.85); border:1px solid #4a6aaa;
  color:#aabbee; padding:5px 10px; border-radius:5px; font-size:11px;
  cursor:pointer; font-family:inherit; transition:all .2s;
}
.stage-btn:hover { background:rgba(30,50,120,.9); color:white; }
.map-btn.active    { background:rgba(200,164,74,.25); border-color:var(--gold); color:var(--gold-light); }
.marker-btn.active { background:rgba(180,30,30,.3);   border-color:#ff6666;     color:#ff9999; }

/* DROPPED TOKENS */
.dropped-token { position:absolute; z-index:20; cursor:move; user-select:none; }
.token-body {
  background:rgba(10,20,60,.92); border:2px solid var(--gold);
  border-radius:8px; padding:4px 9px; text-align:center; white-space:nowrap;
  box-shadow:0 3px 12px rgba(0,0,0,.7); min-width:60px;
}
.token-name { font-size:13px; font-weight:bold; }
.token-close {
  position:absolute; top:-7px; right:-7px; width:17px; height:17px;
  border-radius:50%; background:#cc2222; border:none; color:white;
  font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:25;
}

/* X MARKERS */
.x-marker { position:absolute; z-index:20; cursor:move; user-select:none; }
.marker-body {
  background:rgba(50,10,10,.92); border:2px solid #cc3333;
  border-radius:8px; padding:5px 10px; text-align:center; white-space:nowrap;
  box-shadow:0 3px 12px rgba(0,0,0,.7); min-width:50px;
}
.marker-x     { font-size:18px; font-weight:900; color:#ff5555; line-height:1; }
.marker-label { font-size:12px; font-weight:bold; color:#ffbbbb; margin-top:2px; }
.marker-close {
  position:absolute; top:-7px; right:-7px; width:17px; height:17px;
  border-radius:50%; background:#cc2222; border:none; color:white;
  font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:25;
}

/* CHAR MANAGEMENT */
.char-mgr { background:rgba(13,27,75,.65); border:1px solid #253870; border-radius:10px; padding:12px 16px; }
.char-mgr-title { color:var(--gold); font-size:13px; font-weight:bold; margin-bottom:10px; letter-spacing:1px; }
.char-add-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.char-inp {
  background:rgba(7,12,30,.8); border:1px solid #2a3a6e; border-radius:5px;
  color:white; font-family:inherit; font-size:12px; padding:5px 10px; width:130px; outline:none;
}
.char-inp:focus { border-color:var(--gold); }
.char-sel {
  background:rgba(7,12,30,.8); border:1px solid #2a3a6e; border-radius:5px;
  color:white; font-family:inherit; font-size:12px; padding:5px 8px; outline:none; cursor:pointer;
}
.char-add-btn {
  background:linear-gradient(135deg,#1a3a6a,#2a5aaa); border:1px solid #4a7aee;
  color:#aaccff; padding:5px 14px; border-radius:5px; font-family:inherit; font-size:12px;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.char-add-btn:hover { background:linear-gradient(135deg,#2a4a8a,#3a6acc); color:white; }
.char-mgr-list { display:flex; flex-wrap:wrap; gap:5px; }
.char-list-item {
  display:inline-flex; align-items:center; gap:4px;
  background:rgba(7,12,30,.6); border:1px solid #2a3a6e;
  border-radius:16px; padding:3px 6px 3px 10px; font-size:12px;
}
.char-list-name { font-weight:bold; color:#ddeeff; }
.char-list-cls  { color:var(--gold); font-size:13px; font-weight:bold; }
.char-list-team { color:#445566; font-size:10px; }
.char-list-del {
  background:rgba(160,30,30,.7); border:none; color:white;
  width:16px; height:16px; border-radius:50%; font-size:11px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; padding:0; flex-shrink:0;
}
.char-list-del:hover { background:#cc2222; }

/* PLACEHOLDERS */
.cc-placeholder { width:152px; height:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.cc-initials { font-size:16px; font-weight:900; color:var(--gold-light); text-shadow:0 0 12px rgba(240,204,106,.6); text-align:center; word-break:break-all; padding:0 6px; line-height:1.3; }
.cc-job-badge { font-size:14px; font-weight:bold; color:#99aadd; margin-top:6px; background:rgba(10,20,60,.8); padding:2px 10px; border-radius:8px; }

/* SAVE PANEL */
.save-panel { background:rgba(13,27,75,.65); border:1px solid #253870; border-radius:10px; padding:12px 16px; }
.save-panel-title { color:var(--gold); font-size:13px; font-weight:bold; margin-bottom:10px; letter-spacing:1px; }
.save-slots { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-start; }
.save-slot { background:rgba(7,12,30,.65); border:1px solid #2a3a6e; border-radius:8px; padding:9px 12px; min-width:130px; }
.slot-name { font-size:13px; font-weight:bold; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.slot-dot { width:8px; height:8px; border-radius:50%; background:#2a3050; flex-shrink:0; transition:all .3s; }
.slot-dot.has-save { background:#44cc66; box-shadow:0 0 6px rgba(68,204,102,.8); }
.slot-actions { display:flex; gap:6px; }
.slot-btn { flex:1; padding:5px 4px; border-radius:5px; font-family:inherit; font-size:11px; cursor:pointer; border:1px solid; transition:all .2s; white-space:nowrap; }
.slot-save { background:rgba(13,27,75,.8); border-color:#4a6aaa; color:#aabbee; }
.slot-save:hover { background:rgba(30,50,130,.95); color:white; }
.slot-load { background:rgba(10,40,20,.8); border-color:#2a6a3a; color:#88ee99; }
.slot-load:hover:not(:disabled) { background:rgba(20,80,40,.95); color:white; }
.slot-load:disabled { opacity:.35; cursor:not-allowed; }
.slot-del-btn { background:rgba(80,15,15,.7); border-color:#6a2a2a; color:#ffaaaa; flex:0; padding:4px 7px; }
.slot-del-btn:hover { background:rgba(140,20,20,.9); color:white; }

/* ADD NEW SLOT CARD */
.save-slot-add {
  display:flex; flex-direction:column; gap:6px;
  border-style:dashed !important; border-color:#3a4a7e !important;
  background:rgba(7,12,30,.35) !important; min-width:150px;
}
.slot-name-inp {
  background:rgba(7,12,30,.8); border:1px solid #2a3a6e; border-radius:5px;
  color:white; font-family:inherit; font-size:12px; padding:5px 10px; outline:none; width:100%;
}
.slot-name-inp:focus { border-color:var(--gold); }
.slot-add-btn {
  background:linear-gradient(135deg,#1a3a6a,#2a5aaa); border:1px solid #4a7aee;
  color:#aaccff; padding:5px 10px; border-radius:5px; font-family:inherit;
  font-size:12px; cursor:pointer; width:100%; transition:all .2s;
}
.slot-add-btn:hover { background:linear-gradient(135deg,#2a4a8a,#3a6acc); color:white; }

/* STAGE AREA */
.stage-area { position:relative; }
.boss-stage-wrap { width:100%; }
.side-team { position:absolute; top:0; bottom:0; width:184px; display:flex; flex-direction:column; }
.stage-area > .side-team:first-child { left:-192px; }
.stage-area > .side-team:last-child  { right:-192px; }
.side-team .team-label { text-align:center; font-size:13px; letter-spacing:1px; padding:6px 8px; }
.side-team .char-row   { flex:1; max-height:none; }
.team-label { background:var(--navy); color:var(--gold); padding:7px 16px; font-size:15px; font-weight:bold; letter-spacing:3px; border-radius:8px 8px 0 0; border:1px solid #253870; border-bottom:none; }
.char-row {
  display:flex; gap:8px; padding:8px; background:rgba(13,27,75,.45); border:1px solid #253870;
  border-radius:0 0 8px 8px; flex-direction:column; flex-wrap:nowrap; align-items:center;
  min-height:80px; max-height:70vh; overflow-y:auto; scrollbar-width:thin; scrollbar-color:#253870 transparent;
}
.char-row.team-drag-over { background:rgba(30,90,50,.35); border-color:var(--gold); box-shadow:inset 0 0 20px rgba(200,164,74,.12); }
.char-card { width:152px; }

/* CHARACTER CARD */
@keyframes bob     { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-9px)} }
@keyframes shimmer { 0%,100%{box-shadow:0 4px 12px rgba(0,0,0,.5)} 50%{box-shadow:0 6px 20px rgba(100,150,255,.35)} }
.char-card {
  width:152px; border-radius:8px; overflow:hidden; cursor:grab; flex-shrink:0; user-select:none;
  animation: bob var(--dur,2s) ease-in-out infinite var(--del,0s), shimmer 3s ease-in-out infinite var(--del,0s);
  transition:transform .2s;
}
.char-card:hover  { transform:scale(1.1) translateY(-5px); z-index:10; }
.char-card:active { cursor:grabbing; }
.char-card.is-dragging { opacity:.4; }
.char-card.is-used { opacity:.28; filter:grayscale(80%); cursor:not-allowed; animation:none; pointer-events:none; }
.cc-body { display:block; overflow:hidden; }
.cc-body img { width:100%; height:auto; display:block; pointer-events:none; }

.token-cls-sel {
  background:rgba(10,20,60,0); border:none; color:#99aadd; font-family:inherit;
  font-size:14px; font-weight:bold; cursor:pointer; padding:0; width:100%; outline:none;
  appearance:none; -webkit-appearance:none; text-align:center;
}
.token-cls-sel option { background:#0d1b4b; color:white; }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="header-title">⚔ 龍王副本攻略 ⚔</div>
    <div class="header-hint">拖曳角色到地圖安排分工 · ✕標記死亡位置 · 點擊 × 移除</div>
  </div>
</div>

<div class="layout">

  <div class="stage-area">
    <div class="side-team">
      <div class="team-label">⚔ 隊伍一</div>
      <div class="char-row" id="charRow1"></div>
    </div>

    <div class="boss-stage-wrap">
      <div class="boss-stage" id="bossStage"
           ondragover="onDragOver(event)"
           ondrop="onDrop(event)"
           ondragleave="onDragLeave(event)">
        <div class="map-content" id="mapContent"></div>
        <div class="stage-controls">
          <button class="stage-btn map-btn active" id="mapBtn1" onclick="switchMap(1)">地圖一</button>
          <button class="stage-btn map-btn"        id="mapBtn2" onclick="switchMap(2)">地圖二</button>
          <button class="stage-btn marker-btn" id="markerBtn" onclick="toggleMarkerMode()">✕ 新增標記</button>
          <button class="stage-btn" onclick="clearTokens()">清除地圖</button>
        </div>
      </div>
    </div>

    <div class="side-team">
      <div class="team-label">⚔ 隊伍二</div>
      <div class="char-row" id="charRow2"></div>
    </div>
  </div>

  <div class="char-mgr">
    <div class="char-mgr-title">👤 角色管理</div>
    <div class="char-add-row">
      <input class="char-inp" id="charNameInput" type="text" placeholder="角色名稱" maxlength="12"
             onkeydown="if(event.key==='Enter')addChar()">
      <select class="char-sel" id="charJobSel"></select>
      <select class="char-sel" id="charTeamSel">
        <option value="1">隊伍一</option>
        <option value="2">隊伍二</option>
      </select>
      <button class="char-add-btn" onclick="addChar()">＋ 新增角色</button>
    </div>
    <div class="char-mgr-list" id="charMgrList"></div>
  </div>

  <div class="save-panel">
    <div class="save-panel-title">💾 存檔管理</div>
    <div id="map1Saves" class="save-slots"></div>
    <div id="map2Saves" class="save-slots" style="display:none"></div>
  </div>

</div>

<script>
const ALL_JOBS = ['英雄','聖騎士','黑騎士','冰雷','火毒','主教','刀賊','鏢賊','拳霸','槍手','弩弓手','箭神'];
var MAP_IMAGES = { 1:'1.webp', 2:'2.png' };

var currentMap = 1;
var markerMode = false;
var markerCounter = 0;

function switchMap(n) {
  if (currentMap===n) return;
  clearTokens(); currentMap=n;
  document.getElementById('mapContent').style.backgroundImage = "url('"+MAP_IMAGES[n]+"')";
  document.getElementById('mapBtn1').classList.toggle('active', n===1);
  document.getElementById('mapBtn2').classList.toggle('active', n===2);
  document.getElementById('map1Saves').style.display = n===1 ? '' : 'none';
  document.getElementById('map2Saves').style.display = n===2 ? '' : 'none';
}

// ===== X Markers =====
function toggleMarkerMode() {
  markerMode = !markerMode;
  document.getElementById('markerBtn').classList.toggle('active', markerMode);
  document.getElementById('bossStage').classList.toggle('marker-active', markerMode);
}

document.getElementById('mapContent').addEventListener('click', function(e) {
  if (!markerMode) return;
  if (e.target.closest('.dropped-token,.x-marker,.token-close,.marker-close,.stage-controls')) return;
  var r  = document.getElementById('bossStage').getBoundingClientRect();
  createXMarker(e.clientX - r.left, e.clientY - r.top, '死亡');
  markerMode = false;
  document.getElementById('markerBtn').classList.remove('active');
  document.getElementById('bossStage').classList.remove('marker-active');
});

function createXMarker(lx, ly, label, existingId) {
  var m = document.createElement('div');
  m.className = 'x-marker';
  m.dataset.markerId = existingId || ('m'+(++markerCounter));
  m.style.left = lx+'px'; m.style.top = ly+'px';
  m.innerHTML =
    '<div class="marker-body">' +
      '<div class="marker-x">✕</div>' +
      '<div class="marker-label">'+escHtml(label)+'</div>' +
    '</div>' +
    '<button class="marker-close" onclick="this.parentElement.remove()">×</button>';
  makeDraggableEl(m, '.marker-body');
  document.getElementById('mapContent').appendChild(m);
}

function makeDraggableEl(el, bodySelector) {
  var handle = el.querySelector(bodySelector || '.token-body');
  if (!handle) return;
  handle.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    var sr = document.getElementById('bossStage').getBoundingClientRect();
    var er = el.getBoundingClientRect();
    var ox = e.clientX - er.left, oy = e.clientY - er.top;
    function move(e2) {
      el.style.left = (e2.clientX - sr.left - ox)+'px';
      el.style.top  = (e2.clientY - sr.top  - oy)+'px';
    }
    function up() { document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}
function makeDraggable(el) { makeDraggableEl(el, '.token-body'); }

// ===== Drag from roster =====
var dragging = null;
function onDragStart(e) {
  var card = e.currentTarget;
  if (card.classList.contains('is-used')) { e.preventDefault(); return; }
  dragging = card; dragging.classList.add('is-dragging');
  e.dataTransfer.effectAllowed = 'all';
  e.dataTransfer.setData('text/plain', JSON.stringify({ name:card.dataset.name, cls:card.dataset.cls }));
}
document.addEventListener('dragend', function() {
  if (dragging) { dragging.classList.remove('is-dragging'); dragging=null; }
});

function onDragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect='copy'; document.getElementById('bossStage').classList.add('drag-over'); }
function onDragLeave(e) { if (!e.currentTarget.contains(e.relatedTarget)) document.getElementById('bossStage').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  var stage = document.getElementById('bossStage');
  stage.classList.remove('drag-over');
  var data; try { data=JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
  var card = document.querySelector('.char-card[data-name="'+data.name+'"]');
  if (card) card.classList.add('is-used');
  var r  = stage.getBoundingClientRect();
  var lx = Math.max(0, e.clientX - r.left - 34);
  var ly = Math.max(0, e.clientY - r.top  - 26);
  var token = document.createElement('div');
  token.className='dropped-token'; token.dataset.for=data.name;
  token.style.left=lx+'px'; token.style.top=ly+'px';
  token.innerHTML = makeTokenHTML(data.cls, data.name);
  makeDraggable(token);
  document.getElementById('mapContent').appendChild(token);
}

function removeToken(btn) { var t=btn.parentElement; releaseCard(t.dataset.for); t.remove(); }
function releaseCard(name) { var c=document.querySelector('.char-card[data-name="'+name+'"]'); if(c) c.classList.remove('is-used'); }
function clearTokens() {
  document.querySelectorAll('#mapContent .dropped-token').forEach(function(t){ releaseCard(t.dataset.for); t.remove(); });
  document.querySelectorAll('#mapContent .x-marker').forEach(function(m){ m.remove(); });
}

function makeTokenHTML(cls, name) {
  return '<div class="token-body">'+
    '<select class="token-cls-sel">'+buildJobOptions(cls)+'</select>'+
    '<div class="token-name">'+escHtml(name)+'</div>'+
    '</div>'+
    '<button class="token-close" onclick="removeToken(this)">×</button>';
}
function buildJobOptions(sel) {
  return ALL_JOBS.map(function(j){ return '<option value="'+j+'"'+(j===sel?' selected':'')+'>'+j+'</option>'; }).join('');
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== Character Management =====
const CHAR_KEY = 'dragonKing_chars_v2';
function loadChars() { try{ var s=JSON.parse(localStorage.getItem(CHAR_KEY)); if(Array.isArray(s)) return s; }catch(e){} return []; }
function persistChars() { localStorage.setItem(CHAR_KEY, JSON.stringify(charList)); }
var charList = loadChars();

function setTeamRowHandlers(row, team) {
  row.dataset.team = team;
  row.setAttribute('ondragover',  'onTeamDragOver(event)');
  row.setAttribute('ondragleave', 'onTeamDragLeave(event)');
  row.setAttribute('ondrop',      'onTeamDrop(event)');
}

function renderRoster() {
  var row1=document.getElementById('charRow1'), row2=document.getElementById('charRow2');
  row1.innerHTML=''; row2.innerHTML='';
  setTeamRowHandlers(row1,1); setTeamRowHandlers(row2,2);
  charList.forEach(function(c,idx) {
    var row = c.team===2 ? row2 : row1;
    var delay=((idx%6)*0.3).toFixed(1), dur=(1.85+(idx%6)*0.1).toFixed(2);
    var card=document.createElement('div');
    card.className='char-card'; card.draggable=true;
    card.dataset.name=c.name; card.dataset.cls=c.cls;
    card.style.cssText='--del:'+delay+'s;--dur:'+dur+'s';
    card.setAttribute('ondragstart','onDragStart(event)');
    if (document.querySelector('#mapContent .dropped-token[data-for="'+c.name+'"]')) card.classList.add('is-used');
    var hue=Array.from(c.name).reduce(function(h,ch){ return h+ch.charCodeAt(0); },0)%360;
    card.innerHTML='<div class="cc-body cc-placeholder" style="background:linear-gradient(135deg,hsl('+hue+',40%,18%),hsl('+hue+',50%,10%))">'+
      '<div class="cc-initials">'+escHtml(c.name)+'</div>'+
      '<div class="cc-job-badge">'+escHtml(c.cls)+'</div></div>';
    row.appendChild(card);
  });
  renderCharMgrList();
}

function renderCharMgrList() {
  var el=document.getElementById('charMgrList'); if(!el) return; el.innerHTML='';
  charList.forEach(function(c) {
    var item=document.createElement('div'); item.className='char-list-item';
    item.innerHTML='<span class="char-list-name">'+escHtml(c.name)+'</span>'+
      '<span class="char-list-cls">'+escHtml(c.cls)+'</span>'+
      '<span class="char-list-team">T'+c.team+'</span>'+
      '<button class="char-list-del" onclick="deleteChar(\''+c.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')" >×</button>';
    el.appendChild(item);
  });
}

function addChar() {
  var ni=document.getElementById('charNameInput'), js=document.getElementById('charJobSel'), ts=document.getElementById('charTeamSel');
  var name=ni.value.trim(), cls=js.value, team=parseInt(ts.value)||1;
  if (!name||!cls) { ni.focus(); return; }
  if (charList.some(function(c){ return c.name===name; })) { ni.select(); return; }
  charList.push({name:name,cls:cls,img:null,team:team});
  persistChars(); renderRoster(); ni.value=''; ni.focus();
}

function deleteChar(name) {
  charList=charList.filter(function(c){ return c.name!==name; });
  document.querySelectorAll('#mapContent .dropped-token[data-for="'+name+'"]').forEach(function(t){ t.remove(); });
  persistChars(); renderRoster();
}

(function initJobSel() {
  var sel=document.getElementById('charJobSel'); if(!sel) return;
  ALL_JOBS.forEach(function(j){ var o=document.createElement('option'); o.value=j; o.textContent=j; sel.appendChild(o); });
})();

function onTeamDragOver(e)  { e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect='copy'; e.currentTarget.classList.add('team-drag-over'); }
function onTeamDragLeave(e) { if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('team-drag-over'); }
function onTeamDrop(e) {
  e.preventDefault(); e.stopPropagation();
  var row=e.currentTarget; row.classList.remove('team-drag-over');
  var data; try{ data=JSON.parse(e.dataTransfer.getData('text/plain')); }catch(err){ return; }
  var c=charList.find(function(x){ return x.name===data.name; });
  if (!c || c.team===parseInt(row.dataset.team)) return;
  c.team=parseInt(row.dataset.team); persistChars(); renderRoster();
}

renderRoster();

// ===== Dynamic Save Slots =====
var SLOTS_KEY_M1='dragonKing_slots_m1', SLOTS_KEY_M2='dragonKing_slots_m2';

function loadSlotsStorage(key) {
  try{ var s=JSON.parse(localStorage.getItem(key)); if(Array.isArray(s)) return s; }catch(e){}
  return [];
}
var map1Slots=loadSlotsStorage(SLOTS_KEY_M1);
var map2Slots=loadSlotsStorage(SLOTS_KEY_M2);

function persistSlots(mapNum) {
  localStorage.setItem(mapNum===1?SLOTS_KEY_M1:SLOTS_KEY_M2, JSON.stringify(mapNum===1?map1Slots:map2Slots));
}

function gatherMapState() {
  var sr=document.getElementById('bossStage').getBoundingClientRect();
  var tokens=[], markers=[];
  document.querySelectorAll('#mapContent .dropped-token').forEach(function(t) {
    var sel=t.querySelector('.token-cls-sel');
    tokens.push({ name:t.dataset.for, cls:sel?sel.value:'', lp:parseFloat(t.style.left)/sr.width*100, tp:parseFloat(t.style.top)/sr.height*100 });
  });
  document.querySelectorAll('#mapContent .x-marker').forEach(function(m) {
    var lbl=m.querySelector('.marker-label');
    markers.push({ label:lbl?lbl.textContent:'', lp:parseFloat(m.style.left)/sr.width*100, tp:parseFloat(m.style.top)/sr.height*100 });
  });
  return { tokens:tokens, markers:markers };
}

function applyMapState(data) {
  clearTokens();
  var sr=document.getElementById('bossStage').getBoundingClientRect();
  var content=document.getElementById('mapContent');
  (data.tokens||[]).forEach(function(t) {
    var card=document.querySelector('.char-card[data-name="'+t.name+'"]');
    if (card) card.classList.add('is-used');
    var token=document.createElement('div');
    token.className='dropped-token'; token.dataset.for=t.name;
    token.style.left=(t.lp/100*sr.width)+'px'; token.style.top=(t.tp/100*sr.height)+'px';
    token.innerHTML=makeTokenHTML(t.cls,t.name);
    makeDraggable(token); content.appendChild(token);
  });
  (data.markers||[]).forEach(function(m) {
    createXMarker(m.lp/100*sr.width, m.tp/100*sr.height, m.label);
  });
}

function saveSlotEntry(mapNum, idx) {
  var slots=mapNum===1?map1Slots:map2Slots;
  slots[idx].data=gatherMapState();
  persistSlots(mapNum); renderSavePanel();
  var cid=mapNum===1?'map1Saves':'map2Saves';
  var els=document.querySelectorAll('#'+cid+' .save-slot:not(.save-slot-add)');
  var btn=els[idx]&&els[idx].querySelector('.slot-save');
  if (btn) { var o=btn.textContent; btn.textContent='✅ 已存'; setTimeout(function(){ btn.textContent=o; },1200); }
}

function loadSlotEntry(mapNum, idx) {
  var slot=(mapNum===1?map1Slots:map2Slots)[idx];
  if (!slot||!slot.data) return;
  applyMapState(slot.data);
}

function deleteSlotEntry(mapNum, idx) {
  if (!confirm('確定刪除此存檔格？')) return;
  (mapNum===1?map1Slots:map2Slots).splice(idx,1);
  persistSlots(mapNum); renderSavePanel();
}

function addSlotEntry(mapNum) {
  var inp=document.getElementById('newSlotName'+mapNum);
  var slots=mapNum===1?map1Slots:map2Slots;
  var name=(inp&&inp.value.trim()) || ('存檔 '+(slots.length+1));
  slots.push({name:name,data:null});
  persistSlots(mapNum);
  if (inp) inp.value='';
  renderSavePanel();
}

function renderSavePanel() {
  renderSlotsContainer(1,'map1Saves');
  renderSlotsContainer(2,'map2Saves');
}

function renderSlotsContainer(mapNum, cid) {
  var container=document.getElementById(cid); if(!container) return;
  var slots=mapNum===1?map1Slots:map2Slots;
  container.innerHTML='';
  slots.forEach(function(slot,idx) {
    var div=document.createElement('div'); div.className='save-slot';
    div.innerHTML=
      '<div class="slot-name">'+
        '<span class="slot-dot'+(slot.data?' has-save':'')+'"></span>'+
        escHtml(slot.name)+
        '<button class="slot-btn slot-del-btn" style="margin-left:auto" onclick="deleteSlotEntry('+mapNum+','+idx+')">✕</button>'+
      '</div>'+
      '<div class="slot-actions">'+
        '<button class="slot-btn slot-save" onclick="saveSlotEntry('+mapNum+','+idx+')">💾 存檔</button>'+
        '<button class="slot-btn slot-load" onclick="loadSlotEntry('+mapNum+','+idx+')"'+(slot.data?'':' disabled')+'>📂 載入</button>'+
      '</div>';
    container.appendChild(div);
  });
  var addDiv=document.createElement('div'); addDiv.className='save-slot save-slot-add';
  addDiv.innerHTML=
    '<input class="slot-name-inp" id="newSlotName'+mapNum+'" placeholder="新存檔名稱" maxlength="16" '+
      'onkeydown="if(event.key===\'Enter\')addSlotEntry('+mapNum+')">'+
    '<button class="slot-add-btn" onclick="addSlotEntry('+mapNum+')">＋ 新增存檔</button>';
  container.appendChild(addDiv);
}

renderSavePanel();
</script>
</body>
</html>
